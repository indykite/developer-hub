<div class="welcome-message" id="welcome-message">
    <svg fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
        <path d="M18 3a1 1 0 00-1.196-.98l-10 2A1 1 0 006 5v9.114A4.369 4.369 0 005 14c-1.657 0-3 .895-3 2s1.343 2 3 2 3-.895 3-2V7.82l8-1.6v5.894A4.37 4.37 0 0015 12c-1.657 0-3 .895-3 2s1.343 2 3 2 3-.895 3-2V3z"></path>
    </svg>
    <h4>{{ scenario.welcome.heading }}</h4>
    <p class="mb-4">{{ scenario.welcome.lead }}</p>

    <div class="cast-diagram text-start">
        <h6 class="text-center mb-3">The Cast</h6>
        <div class="text-center">
            {% for member in scenario.welcome.cast %}
            <div class="cast-member"><strong>{{ member.name }}</strong> — {{ member.detail }}</div>
            {% endfor %}
        </div>
    </div>

    <p class="text-muted small mb-1">{{ scenario.welcome.footnote }}</p>
    <p class="text-muted small">Select a scene from the right panel to begin the story.</p>
</div>
