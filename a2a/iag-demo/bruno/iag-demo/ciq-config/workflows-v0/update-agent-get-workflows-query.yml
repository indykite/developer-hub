---
info:
  name: Update Agent Get Workflows Query
  type: http
  seq: 2

http:
  method: PUT
  url: "{{ik_api_url_prefix}}/configs/v1/knowledge-queries/{{knowledge_query_list_workflows_query}}"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
          "name": "knowledge-query-list-workflows",
          "display_name": "List Workflows",
          "description": "List all the workflows in IKG",
          "project_id": "{{project_id}}",
          "policy_id": "{{authz_policy_sub_can_invoke_workflow_policy}}",
          "query": "{ \"nodes\": [ \"workflow\" ], \"aggregate_values\": [ \"agent_list\", \"invoke_list\" ] }",
          "status": "ACTIVE"
      }
  auth: inherit

runtime:
  variables:
    - name: get_agent_workflows_policy
      value: gid:AAAAFn8x970x80CPrzeCXVe_eYU

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
