        "project_id": "{{project_id}}",
        "policy": "{ \"meta\": { \"policy_version\": \"1.0-ciq\" }, \"subject\": { \"type\": \"_Application\" }, \"condition\": { \"cypher\": \"MATCH (subject:_Application {external_id: $_appId}), (user:User {external_id: $person_external_id})-[:WORKS_IN|INVOKES*..2]->(workflow:Workflow)-[invokes:INVOKES*1..3]->(agent:Agent) WITH subject, workflow, COLLECT(DISTINCT agent) AS agent_list, COLLECT(invokes) AS invoke_list\", \"filter\": [ ] }, \"allowed_reads\": { \"nodes\": [ \"workflow.*\" ], \"relationships\": [ ], \"aggregate_values\": [ \"agent_list\", \"invoke_list\" ] } }",
