---
info:
  name: Create Get Stock Quote Query
  type: http
  seq: 2

http:
  method: POST
  url: "{{ik_api_url_prefix}}/configs/v1/knowledge-queries"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
          "name": "get-stock-quote",
          "display_name": "Get Stock Quote",
          "description": "Get Stock Quote retrieves the user, their department and a stock quote for the requested ticker symbol. The only information required is the currently authenticated user's bearer token and a ticker symbol for the stock. Use this function when the user asks questions about stock quotes, such as: 'What is the current price of <ticker>?' Returns: An object containing the user's details, including full_name, department, and the stock price. Call tool 'ciq_execute' with the user's bearer token as the authorization header. Use the following arguments: \"id\": \"get-stock-quote\" and \"ticker\". Example: { \"id\": \"get-stock-quote\", \"input_params\": { \"ticker\": \"NVDA\"} }.",
          "project_id": "{{project_id}}",
          "policy_id": "{{get_stock_quote_policy}}",
          "query": "{ \"nodes\": [ \"subject.external_id\", \"subject.property.name\", \"subject.property.title\", \"department.property.name\", \"quote.property.price\" ], \"relationships\": [  ], \"aggregate_values\": [ ] }",
          "status": "ACTIVE"
      }
  auth: inherit

runtime:
  variables:
    - name: get_agent_workflows_policy
      value: gid:AAAAFn8x970x80CPrzeCXVe_eYU
    - name: get_regulatory_agreements_policy
      value: gid:AAAAFjQRXtVGWk-4twKxr1bEGXw
    - name: get_customer_facing_documents
      value: gid:AAAAFhed-YC5t0zTs3XtRez0WhI
    - name: get_self_policy
      value: gid:AAAAFpytRclEdkbbi8YwKxgqlN4

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
