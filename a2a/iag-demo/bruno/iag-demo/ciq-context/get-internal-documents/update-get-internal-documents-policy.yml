---
info:
  name: Update Get Internal Documents Policy
  type: http
  seq: 4

http:
  method: PUT
  url: "{{ik_api_url_prefix}}/configs/v1/authorization-policies/{{get_internal_documents_policy}}"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
          "name": "get-internal-documents",
          "display_name": "Get Internal Documents",
          "description": "Given a users Bearer token return a list of internal documents.",
          "project_id": "{{project_id}}",
          "policy": "{ \"meta\": { \"policy_version\": \"1.0-ciq\" }, \"subject\": { \"type\": \"User\" }, \"condition\": { \"cypher\": \"MATCH (subject:User {external_id: $token.sub})-[:WORKS_IN|CAN_ACCESS|CONTAINS*..4]->(document:Document)-[:IS_TYPE]->(taxonomy:Taxonomy {external_id: $taxonomy_external_id})\", \"filter\": [ ] }, \"allowed_reads\": { \"nodes\": [ \"subject.*\", \"document.*\", \"taxonomy.*\" ], \"relationships\": [  ], \"aggregate_values\": [ ] } }",
          "status": "ACTIVE"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
