---
info:
  name: Update Get Internal Documents Query
  type: http
  seq: 5

http:
  method: PUT
  url: "{{ik_api_url_prefix}}/configs/v1/knowledge-queries/{{get_internal_documents_query}}"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
          "name": "get-internal-documents",
          "display_name": "Get Internal Documents",
          "description": "get-internal-documents retrieves the user, and the documents they can see that match the supplied taxonomy. Use this function when we need to find documents for the logged in user, such as: 'What documents can I access?', 'What policy documents exist?'  Returns: An object containing the document id, document name, document description, document url and the logged in user. Call tool 'ciq_execute' with the user's bearer token as the Authorization header and a taxonomy. Use the following arguments: \"id\": \"get-internal-documents\". Example: { \"id\": \"get-internal-documents\", \"input_params\": { \"taxonomy_external_id\": \"policy\" } }.",
          "project_id": "{{project_id}}",
          "policy_id": "{{get_internal_documents_policy}}",
          "query": "{ \"nodes\": [ \"subject.external_id\", \"subject.property.name\", \"subject.property.title\", \"document.external_id\", \"document.property.name\", \"document.property.description\", \"document.property.url\", \"taxonomy.property.name\" ], \"relationships\": [  ], \"aggregate_values\": [ ] }",
          "status": "ACTIVE"
      }
  auth: inherit

