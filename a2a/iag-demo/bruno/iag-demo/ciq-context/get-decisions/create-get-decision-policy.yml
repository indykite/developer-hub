---
info:
  name: Create Get Decision Policy
  type: http
  seq: 1

http:
  method: POST
  url: "{{ik_api_url_prefix}}/configs/v1/authorization-policies"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
          "name": "get-decisions",
          "display_name": "Get Decisions",
          "description": "Given a users Bearer token return a list of decisions that relate to a given document.",
          "project_id": "{{project_id}}",
          "policy": "{ \"meta\": { \"policy_version\": \"1.0-ciq\" }, \"subject\": { \"type\": \"User\" }, \"condition\": { \"cypher\": \"MATCH (subject:User {external_id: $token.sub})-[:WORKS_IN|CAN_ACCESS|CONTAINS*..4]->(document:Document {external_id: $document_external_id})<-[document_applied]-(decision:Decision)<--(ticket:Ticket)-[:REGARDING]->(account:Account), (ticket)-[:CREATED_BY]-(customer:Customer), (decision)<-[:MADE]-(actor:User)\", \"filter\": [ ] }, \"allowed_reads\": { \"nodes\": [ \"subject.*\", \"actor.*\", \"document.*\", \"decision\", \"decision.*\", \"ticket.*\", \"account.*\", \"customer.*\" ], \"relationships\": [ \"document_applied.*\" ], \"aggregate_values\": [ ] } }",
          "status": "ACTIVE"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
