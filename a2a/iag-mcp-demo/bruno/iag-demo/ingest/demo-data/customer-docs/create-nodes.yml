          { "external_id": "reg-cdic", "type": "RegulatoryAgreement", "is_identity": false, "properties": [{ "type": "name", "value": "CDIC Act" }, {"type": "description", "value": "An agreement between [Institution Name] and the Canada Deposit Insurance Corporation ('CDIC'), intended to ensure ongoing compliance with the Canada Deposit Insurance Corporation Act and its associated By-laws, specifically regarding the proper identification of insured deposits, timely reporting of financial data, and adherence to sound business and financial practices as required under the Act."}] },
          { "external_id": "reg-sec-40", "type": "RegulatoryAgreement", "is_identity": false, "properties": [{ "type": "name", "value": "SEC 1940 Act" }, {"type": "description", "value": "This Agreement is entered into to ensure that [Fund Name] (the 'Fund') operates in compliance with the applicable provisions of the Investment Company Act of 1940, as amended (the '1940 Act'), and the rules thereunder. The parties agree to adhere to all requirements regarding the registration, valuation of portfolio securities, custody of assets, and limitations on transactions with affiliates. This agreement ensures the Fund maintains its status as a registered investment company or properly relies on a specific exemption."}] },
          { "external_id": "reg-sec-498", "type": "RegulatoryAgreement", "is_identity": false, "properties": [{ "type": "name", "value": "SEC Rule 498" }, {"type": "description", "value": "Compliant with SEC Rule 498, allowing for the delivery of a 'Summary Prospectus' for open-end mutual funds. Requires that key investor information be provided upfront, while detailed documents are available online. Ensures compliance with 'access equals delivery' provisions, provided that the required documents are hosted on a publicly accessible website, properly hyperlinked, and that requests for paper copies are met within three business days."}] },
          { "external_id": "reg-ucits-v", "type": "RegulatoryAgreement", "is_identity": false, "properties": [{ "type": "name", "value": "UCITS V" }, {"type": "description", "value": "Under this agreement, the Depositary assumes strict liability for the loss of financial instruments held in custody, maintains legally protected segregation of assets (including at the sub-custodian level), and ensures that all delegation of safekeeping functions meets the stringent due diligence and independence standards of UCITS V."}] },
          { "external_id": "reg-priips", "type": "RegulatoryAgreement", "is_identity": false, "properties": [{ "type": "name", "value": "PRIIPS Regulation" }, {"type": "description", "value": "The firm complies with Regulation (EU) No 1286/2014 (and the UK equivalent, where applicable) regarding Packaged Retail and Insurance-based Investment Products (PRIIPs). We ensure that a Key Information Document (KID) is produced for all in-scope products, is accurate, fair, clear, and not misleading, and that it is provided to retail investors in good time prior to their investment. The KID is reviewed annually and updated promptly upon any significant change to risk, cost, or performance."}] },
          { "external_id": "reg-isda", "type": "RegulatoryAgreement", "is_identity": false, "properties": [{ "type": "name", "value": "ISDA Master" }, {"type": "description", "value": "An industry-standardized, bilateral contract governing over-the-counter (OTC) derivatives, designed to enforce close-out netting, mitigate credit risk, and provide a compliant framework for regulatory reporting and margin exchange (e.g., EMIR, Dodd-Frank)."}] },
          { "external_id": "reg-ni45", "type": "RegulatoryAgreement", "is_identity": false, "properties": [{ "type": "name", "value": "NI 45-106" }, {"type": "description", "value": "The issuance of Securities is being made in reliance upon exemptions from the prospectus requirements of applicable Canadian provincial and territorial securities legislation, specifically in accordance with the exemptions set out in National Instrument 45-106 – Prospectus Exemptions ('NI 45-106'). The Issuer represents that no prospectus has been filed, and therefore no statutory rights of action or rescission exist, except as otherwise provided by applicable law or the terms of an Offering Memorandum."}] },
          { "external_id": "reg-fidleg", "type": "RegulatoryAgreement", "is_identity": false, "properties": [{ "type": "name", "value": "Swiss FIDLEG" }, {"type": "description", "value": "This Agreement is subject to the Swiss Financial Services Act (FIDLEG/FinSA), which entered into force on January 1, 2020. [Company Name] acts as a financial service provider in accordance with FIDLEG. Based on the client information provided, the Client is classified as [Retail/Professional/Institutional]. In accordance with the Rules of Conduct (Art. 7-20 FIDLEG), [Company Name] is committed to acting in the client's best interest, providing transparency regarding products (including Key Information Documents - KIDs), disclosing fees/retrocessions, and ensuring best execution of orders. A [Suitability/Appropriateness] test will be performed. The client is aware of the risks associated with financial instruments as detailed in the 'Risks Involved in Trading Financial Instruments' brochure. This agreement ensures compliance with documentation and accountability requirements."}] },
          { "external_id": "reg-emir", "type": "RegulatoryAgreement", "is_identity": false, "properties": [{ "type": "name", "value": "EU EMIR" }, {"type": "description", "value": "This Agreement governs the compliance of [Party A] and [Party B] with the European Market Infrastructure Regulation (EU) No 648/2012 as amended (EMIR/EMIR Refit). It encompasses all applicable obligations, including the reporting of OTC and Exchange Traded Derivatives (ETD) to an authorized Trade Repository (Article 9), the central clearing of eligible OTC derivatives (Article 4), and the application of Risk Mitigation Techniques (including timely confirmation, portfolio reconciliation, dispute resolution, and margin exchange for non-cleared trades)."}] },
          { "external_id": "reg-uae-cb", "type": "RegulatoryAgreement", "is_identity": false, "properties": [{ "type": "name", "value": "New CBUAE Law" }, {"type": "description", "value": "Law No. (6) of 2025 (the \"New CBUAE Law\") is a landmark overhaul that consolidates the UAE's financial regulatory framework, unifying the oversight of banking, insurance, and payment systems under the Central Bank of the UAE (CBUAE). It effectively repeals the previous 2018 Central Bank Law and the 2023 Insurance Law."}] },
